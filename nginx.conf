server {
    listen 80;
    server_name _;

    # Google Search Console HTML verification (served at root, e.g. /googleXXXX.html)
    location ~* ^/google[a-zA-Z0-9_-]*\.html$ {
        root /var/www/verify;
        try_files $uri =404;
    }

    # All API routes go through the Next.js frontend
    # The frontend handles /api/login (auth) and /api/proxy/* (backend forwarding)
    location /api/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend pages
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket routes to backend directly
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
