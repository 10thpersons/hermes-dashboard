version: "3.8"

services:
  backend:
    build: ./backend
    container_name: hermes-dashboard-api
    restart: unless-stopped
    environment:
      - HERMES_HOME=/root/.hermes
      - OBSIDIAN_VAULT=/root/obsidian-vault
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-hermes-dashboard-2026}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - VANSROUTE_API_KEY=${VANSROUTE_API_KEY:-}
      - VANSROUTE_URL=${VANSROUTE_URL:-http://host.docker.internal:3003}
      - VANSROUTE_CONTAINER=${VANSROUTE_CONTAINER:-vansrouter}
    volumes:
      - /root/.hermes:/root/.hermes
      - /root/obsidian-vault:/root/obsidian-vault:ro
      # Docker socket so the backend can `docker exec vansrouter ...` as a fallback
      # to read the VansRoute SQLite DB when the HTTP API is unavailable.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: hermes-dashboard-web
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:8000
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-hermes-dashboard-2026}
    ports:
      - "3001:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: hermes-dashboard-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./verification:/var/www/verify:ro
    depends_on:
      - frontend
      - backend
